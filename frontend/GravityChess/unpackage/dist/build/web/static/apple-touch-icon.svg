<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- 背景 -->
  <rect width="180" height="180" rx="40" fill="#263238"/>
  
  <!-- 棋盘网格 -->
  <g stroke="#3a4a52" stroke-width="3">
    <!-- 垂直线 -->
    <line x1="45" y1="25" x2="45" y2="155"/>
    <line x1="80" y1="25" x2="80" y2="155"/>
    <line x1="115" y1="25" x2="115" y2="155"/>
    <line x1="150" y1="25" x2="150" y2="155"/>
    <!-- 水平线 -->
    <line x1="25" y1="45" x2="155" y2="45"/>
    <line x1="25" y1="80" x2="155" y2="80"/>
    <line x1="25" y1="115" x2="155" y2="115"/>
    <line x1="25" y1="150" x2="155" y2="150"/>
  </g>
  
  <!-- 棋子 - 粉色 (重力下落效果) -->
  <circle cx="62" cy="135" r="14" fill="#FF69B4"/>
  <circle cx="62" cy="97" r="14" fill="#FF69B4"/>
  <circle cx="62" cy="60" r="14" fill="#FF69B4"/>
  
  <!-- 棋子 - 蓝色 (重力下落效果) -->
  <circle cx="132" cy="135" r="14" fill="#87CEEB"/>
  <circle cx="132" cy="97" r="14" fill="#87CEEB"/>
  
  <!-- 重力指示箭头 -->
  <path d="M90 8 L90 20 M82 15 L90 20 L98 15" stroke="#FFD700" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>