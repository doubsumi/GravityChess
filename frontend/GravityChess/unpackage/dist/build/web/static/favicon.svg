<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 背景 -->
  <rect width="100" height="100" rx="15" fill="#263238"/>
  
  <!-- 棋盘网格 -->
  <g stroke="#3a4a52" stroke-width="2">
    <!-- 垂直线 -->
    <line x1="25" y1="15" x2="25" y2="85"/>
    <line x1="45" y1="15" x2="45" y2="85"/>
    <line x1="65" y1="15" x2="65" y2="85"/>
    <line x1="85" y1="15" x2="85" y2="85"/>
    <!-- 水平线 -->
    <line x1="15" y1="25" x2="85" y2="25"/>
    <line x1="15" y1="45" x2="85" y2="45"/>
    <line x1="15" y1="65" x2="85" y2="65"/>
    <line x1="15" y1="85" x2="85" y2="85"/>
  </g>
  
  <!-- 棋子 - 粉色 (重力下落效果) -->
  <circle cx="35" cy="75" r="8" fill="#FF69B4"/>
  <circle cx="35" cy="55" r="8" fill="#FF69B4"/>
  <circle cx="35" cy="35" r="8" fill="#FF69B4"/>
  
  <!-- 棋子 - 蓝色 (重力下落效果) -->
  <circle cx="75" cy="75" r="8" fill="#87CEEB"/>
  <circle cx="75" cy="55" r="8" fill="#87CEEB"/>
  
  <!-- 重力指示箭头 -->
  <path d="M50 5 L50 12 M47 9 L50 12 L53 9" stroke="#FFD700" stroke-width="2" fill="none"/>
</svg>