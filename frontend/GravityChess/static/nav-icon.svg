<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 背景 -->
  <rect width="32" height="32" rx="6" fill="#263238"/>
  
  <!-- 棋盘网格 - 简化的4x4 -->
  <g stroke="#3a4a52" stroke-width="1">
    <!-- 垂直线 -->
    <line x1="8" y1="4" x2="8" y2="28"/>
    <line x1="14" y1="4" x2="14" y2="28"/>
    <line x1="20" y1="4" x2="20" y2="28"/>
    <line x1="26" y1="4" x2="26" y2="28"/>
    <!-- 水平线 -->
    <line x1="4" y1="8" x2="28" y2="8"/>
    <line x1="4" y1="14" x2="28" y2="14"/>
    <line x1="4" y1="20" x2="28" y2="20"/>
    <line x1="4" y1="26" x2="28" y2="26"/>
  </g>
  
  <!-- 棋子 - 粉色 -->
  <circle cx="11" cy="23" r="2.5" fill="#FF69B4"/>
  <circle cx="11" cy="17" r="2.5" fill="#FF69B4"/>
  <circle cx="11" cy="11" r="2.5" fill="#FF69B4"/>
  
  <!-- 棋子 - 蓝色 -->
  <circle cx="23" cy="23" r="2.5" fill="#87CEEB"/>
  <circle cx="23" cy="17" r="2.5" fill="#87CEEB"/>
  
  <!-- 重力箭头 -->
  <path d="M16 1 L16 4 M14.5 2.5 L16 4 L17.5 2.5" stroke="#FFD700" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>